<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>State Takeover - PRO</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { cursor: crosshair; background: #111; border: 2px solid #333; margin-top: 10px; }
        .ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>STATE TAKEOVER</h1>
        <p>Bölgeye tıkla (seç), sonra diğerine tıkla (saldır).</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.8;

        let selected = null;
        const states = [
            { x: 100, y: 100, troops: 20, owner: 'player', id: 0 },
            { x: 300, y: 200, troops: 10, owner: 'neutral', id: 1 },
            { x: 500, y: 100, troops: 30, owner: 'enemy', id: 2 },
            { x: 200, y: 400, troops: 15, owner: 'neutral', id: 3 },
            { x: 400, y: 400, troops: 25, owner: 'enemy', id: 4 }
        ];

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            states.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, 30, 0, Math.PI * 2);
                ctx.fillStyle = (s.owner === 'player' ? '#2ecc71' : (s.owner === 'enemy' ? '#e74c3c' : '#7f8c8d'));
                if (selected === s) ctx.strokeStyle = 'white'; else ctx.strokeStyle = 'transparent';
                ctx.lineWidth = 5;
                ctx.stroke();
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.fillText(Math.floor(s.troops), s.x, s.y + 5);
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            states.forEach(s => {
                const dist = Math.hypot(mx - s.x, my - s.y);
                if (dist < 30) {
                    if (selected && selected !== s && selected.owner === 'player') {
                        // Saldırı mantığı
                        if (selected.troops > s.troops) {
                            s.owner = 'player';
                            s.troops = Math.floor(selected.troops / 2);
                            selected.troops = Math.floor(selected.troops / 2);
                        } else {
                            selected.troops = 1;
                        }
                        selected = null;
                    } else if (s.owner === 'player') {
                        selected = s;
                    }
                }
            });
            draw();
        });

        // Oyun Döngüsü
        setInterval(() => {
            states.forEach(s => {
                if (s.owner !== 'neutral') s.troops += 0.2;
            });
            // Basit Yapay Zeka (Enemy atak)
            if (Math.random() < 0.05) {
                let enemies = states.filter(s => s.owner === 'enemy');
                enemies.forEach(e => {
                    if (e.troops > 20) {
                        let target = states[Math.floor(Math.random() * states.length)];
                        if (target.owner !== 'enemy') {
                            if (e.troops > target.troops) {
                                target.owner = 'enemy';
                                target.troops = Math.floor(e.troops / 2);
                                e.troops = Math.floor(e.troops / 2);
                            }
                        }
                    }
                });
            }
            draw();
        }, 100);
    </script>
</body>
</html>
