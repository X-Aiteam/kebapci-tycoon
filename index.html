<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>State Takeover Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .map { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center; margin-top: 20px; }
        .state { width: 100px; height: 100px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .state.player { background: #2ecc71; } /* Oyuncu */
        .state.enemy { background: #e74c3c; }  /* Düşman */
        .state.neutral { background: #7f8c8d; } /* Nötr */
        .controls { margin-top: 30px; padding: 20px; background: #333; }
    </style>
</head>
<body>
    <h1>Savaş Meydanı</h1>
    <div id="status">Bölge Seç ve Saldır!</div>
    <div class="map" id="map"></div>
    <div class="controls">
        <button onclick="recruit()">Asker Bas (+10)</button>
        <button onclick="attack()">Saldır</button>
    </div>

    <script>
        let selectedState = null;
        let states = [
            { id: 0, owner: 'player', troops: 20 },
            { id: 1, owner: 'neutral', troops: 10 },
            { id: 2, owner: 'enemy', troops: 30 }
        ];

        function renderMap() {
            const map = document.getElementById('map');
            map.innerHTML = '';
            states.forEach(s => {
                const el = document.createElement('div');
                el.className = `state ${s.owner} ${selectedState === s.id ? 'selected' : ''}`;
                el.innerHTML = `<strong>${s.troops}</strong>`;
                el.onclick = () => selectState(s.id);
                map.appendChild(el);
            });
        }

        function selectState(id) {
            selectedState = id;
            document.getElementById('status').innerText = "Seçilen Bölge: " + id;
            renderMap();
        }

        function recruit() {
            if(selectedState !== null && states[selectedState].owner === 'player') {
                states[selectedState].troops += 10;
                renderMap();
            }
        }

        function attack() {
            if(selectedState === null) return;
            // Basit saldırı mantığı: Sadece yanındaki bölgeye (burada örnek olarak id+1)
            let targetId = selectedState + 1;
            if(states[targetId]) {
                let attacker = states[selectedState];
                let defender = states[targetId];
                
                if(attacker.troops > defender.troops) {
                    defender.owner = attacker.owner;
                    defender.troops = Math.floor(attacker.troops / 2);
                    attacker.troops = Math.floor(attacker.troops / 2);
                    alert("Bölge ele geçirildi!");
                } else {
                    attacker.troops = 0;
                    alert("Saldırı başarısız!");
                }
                renderMap();
            }
        }

        renderMap();
        // Pasif Gelir (Asker üretimi)
        setInterval(() => {
            states.forEach(s => { if(s.owner !== 'neutral') s.troops += 1; });
            renderMap();
        }, 3000);
    </script>
</body>
</html>
