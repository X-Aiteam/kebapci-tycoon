<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon-Tactics Pro Engine</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; }
        button { background: #ff4500; border: 2px solid #fff; color: #fff; padding: 15px 40px; margin: 10px; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; color: #ff4500; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="main-menu" class="menu">
        <h1>NEON TACTICS</h1>
        <button onclick="Game.start()">BAŞLAT</button>
        <button onclick="Game.openSettings()">AYARLAR</button>
    </div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
/** * PROFESSIONAL GAME ARCHITECTURE - MODULAR SYSTEM
 */

// 1. SES YÖNETİCİSİ
const AudioManager = {
    play(effect) { console.log("Ses çalıyor: " + effect); /* Audio nesneleri buraya */ },
    toggleMute() { /* Mute logic */ }
};

// 2. INPUT YÖNETİCİSİ (Mobil & PC Destekli)
const InputManager = {
    keys: {},
    init() {
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
    }
};

// 3. KARAKTER SINIFI (Player)
class Player {
    constructor(x, y) {
        this.x = x; this.y = y; this.size = 30; this.speed = 7;
    }
    update(keys) {
        if (keys['ArrowUp']) this.y -= this.speed;
        if (keys['ArrowDown']) this.y += this.speed;
        if (keys['ArrowLeft']) this.x -= this.speed;
        if (keys['ArrowRight']) this.x += this.speed;
    }
    draw(ctx) {
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

// 4. OYUN MOTORU (Game Engine Core)
const Game = {
    canvas: document.getElementById('gameCanvas'),
    ctx: null,
    player: null,
    score: 0,
    isRunning: false,

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.player = new Player(100, 100);
        InputManager.init();
        this.loop();
    },

    start() {
        document.getElementById('main-menu').classList.add('hidden');
        this.isRunning = true;
        AudioManager.play('start');
    },

    openSettings() { alert("Ayarlar paneli eklenecek."); },

    update() {
        if (!this.isRunning) return;
        this.player.update(InputManager.keys);
        this.score += 0.1;
    },

    render() {
        this.ctx.fillStyle = '#050505';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        if (this.isRunning) {
            this.player.draw(this.ctx);
            this.ctx.fillStyle = '#fff';
            this.ctx.fillText("SKOR: " + Math.floor(this.score), 20, 30);
        }
    },

    loop() {
        this.update();
        this.render();
        requestAnimationFrame(() => this.loop());
    }
};

// Başlatıcı
Game.init();
</script>
</body>
</html>
