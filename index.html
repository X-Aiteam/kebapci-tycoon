<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebapçı Tycoon</title>
    <style>
        body { 
            background: linear-gradient(180deg, #2c3e50 0%, #000000 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; color: white; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .container { 
            background: #1a1a1a; padding: 30px; border-radius: 20px; 
            border: 2px solid #e67e22; box-shadow: 0 0 20px rgba(230, 126, 34, 0.5);
            max-width: 400px; width: 100%;
        }
        h1 { color: #e67e22; margin-bottom: 20px; text-transform: uppercase; }
        .stats { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        button { 
            width: 100%; padding: 20px; font-size: 18px; margin: 10px 0; 
            cursor: pointer; border: none; border-radius: 10px; font-weight: bold;
            transition: all 0.2s ease;
        }
        .cook { background: #e67e22; color: white; }
        .cook:active { transform: scale(0.95); background: #d35400; }
        .hire { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kebapçı Tycoon</h1>
        <div class="stats">
            <h2 id="money">Para: 0 TL</h2>
            <p id="kebabs">Toplam Kebap: 0</p>
        </div>
        <button class="cook" onclick="cookKebab()">Kebap Çevir 🍢</button>
        <button class="hire" onclick="hireWorker()">Usta Tut (50 TL)</button>
    </div>

    <script>
        let money = 0, kebabs = 0, workerCost = 50;
        function cookKebab() {
            kebabs++; money += 10;
            document.getElementById('money').innerText = "Para: " + money + " TL";
            document.getElementById('kebabs').innerText = "Toplam Kebap: " + kebabs;
        }
        function hireWorker() {
            if (money >= workerCost) {
                money -= workerCost;
                setInterval(cookKebab, 2000);
                workerCost += 50;
                document.querySelector('.hire').innerText = "Usta Tut (" + workerCost + " TL)";
                document.getElementById('money').innerText = "Para: " + money + " TL";
            } else { alert("Para yetmiyor kirve!"); }
        }
    </script>
</body>
</html>
