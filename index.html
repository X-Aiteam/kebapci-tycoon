<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Takeover: Battle Royale</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-header { text-align: center; margin-bottom: 20px; }
        .map { display: grid; grid-template-columns: repeat(3, 100px); gap: 15px; }
        .state { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 4px solid #333; font-weight: bold; transition: transform 0.2s; position: relative; }
        .state:hover { transform: scale(1.1); }
        .state.player { background-color: #2ecc71; border-color: #27ae60; }
        .state.enemy { background-color: #e74c3c; border-color: #c0392b; }
        .state.neutral { background-color: #95a5a6; border-color: #7f8c8d; }
        .state.selected { outline: 4px solid #f1c40f; }
        .hud { margin-top: 30px; padding: 20px; background: #1e1e1e; border-radius: 10px; width: 300px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="background_music.mp3" type="audio/mpeg">
    </audio>

    <div class="game-header">
        <h1>STATE TAKEOVER</h1>
        <p>Amacın: Tüm bölgeleri ele geçir!</p>
    </div>

    <div class="map" id="map"></div>

    <div class="hud">
        <div id="status">Bölge seç ve saldır!</div>
        <button onclick="toggleMusic()">🎵 Müzik Aç/Kapat</button>
    </div>

    <script>
        let states = [
            { id: 0, owner: 'player', troops: 20 },
            { id: 1, owner: 'neutral', troops: 10 },
            { id: 2, owner: 'neutral', troops: 15 },
            { id: 3, owner: 'neutral', troops: 5 },
            { id: 4, owner: 'enemy', troops: 30 },
            { id: 5, owner: 'enemy', troops: 20 }
        ];
        let selectedId = null;

        function render() {
            const map = document.getElementById('map');
            map.innerHTML = '';
            states.forEach(s => {
                const el = document.createElement('div');
                el.className = `state ${s.owner} ${selectedId === s.id ? 'selected' : ''}`;
                el.innerText = s.troops;
                el.onclick = () => handleStateClick(s.id);
                map.appendChild(el);
            });
        }

        function handleStateClick(id) {
            if (selectedId === null) {
                if (states[id].owner === 'player') selectedId = id;
            } else {
                if (selectedId === id) {
                    selectedId = null;
                } else if (isAdjacent(selectedId, id)) {
                    attack(selectedId, id);
                    selectedId = null;
                } else {
                    selectedId = (states[id].owner === 'player') ? id : null;
                }
            }
            render();
        }

        function isAdjacent(a, b) {
            // Basit grid komşuluk kontrolü
            return Math.abs(a - b) <= 3;
        }

        function attack(from, to) {
            if (states[from].owner === 'player' && states[to].owner !== 'player') {
                if (states[from].troops > states[to].troops) {
                    states[to].owner = 'player';
                    states[to].troops = Math.floor(states[from].troops / 2);
                    states[from].troops = Math.floor(states[from].troops / 2);
                    document.getElementById('status').innerText = "Bölge alındı!";
                } else {
                    states[from].troops = 1;
                    document.getElementById('status').innerText = "Saldırı başarısız!";
                }
            }
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            audio.paused ? audio.play() : audio.pause();
        }

        setInterval(() => {
            states.forEach(s => {
                if (s.owner !== 'neutral') s.troops += 1;
            });
            render();
        }, 2000);

        render();
    </script>
</body>
</html>
