<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kebapçı Tycoon</title>
    <style>
        body { 
            background: linear-gradient(135deg, #d35400, #c0392b); 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            color: white; 
            padding-top: 50px; 
        }
        .dukkan { 
            background: rgba(0,0,0,0.4); 
            padding: 30px; 
            border-radius: 20px; 
            display: inline-block; 
            border: 2px solid #f1c40f; 
        }
        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); }
        .cook { background: #f1c40f; color: #333; font-weight: bold; }
        .hire { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="dukkan">
        <h1>🍢 Kebapçı Tycoon</h1>
        <h2 id="money">Para: 0 TL</h2>
        <p id="kebabs">Toplam Kebap: 0</p>
        <button class="cook" onclick="cookKebab()">Kebap Çevir 🍢</button>
        <button class="hire" onclick="hireWorker()">Usta Tut (50 TL)</button>
    </div>

    <script>
        let money = 0, kebabs = 0, workerCost = 50;
        function cookKebab() {
            kebabs++; money += 10;
            document.getElementById('money').innerText = "Para: " + money + " TL";
            document.getElementById('kebabs').innerText = "Toplam Kebap: " + kebabs;
        }
        function hireWorker() {
            if (money >= workerCost) {
                money -= workerCost;
                setInterval(cookKebab, 2000);
                workerCost += 50;
                document.querySelector('.hire').innerText = "Usta Tut (" + workerCost + " TL)";
                document.getElementById('money').innerText = "Para: " + money + " TL";
            } else { alert("Para yetmiyor kirve!"); }
        }
    </script>
</body>
</html>
