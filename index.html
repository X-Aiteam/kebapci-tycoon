<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebapçı Tycoon - Live</title>
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background: radial-gradient(circle, #3d1b00 0%, #000 100%);
            color: #ffde59; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #fire-bg { 
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, #ff4500 0%, transparent 10%, #ff4500 20%);
            opacity: 0.1; pointer-events: none; z-index: 0;
        }
        .container { z-index: 1; background: rgba(0,0,0,0.85); padding: 20px; border: 3px solid #ff4500; border-radius: 20px; text-align: center; width: 320px; }
        .character { font-size: 50px; margin: 10px; }
        .log { height: 80px; overflow-y: auto; background: #222; margin: 10px 0; padding: 5px; font-size: 12px; border-radius: 5px; text-align: left; color: #fff; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background: #ff4500; color: white; }
    </style>
</head>
<body>
    <div id="fire-bg"></div>
    <div class="container">
        <h1>Kebapçı Tycoon</h1>
        <div id="avatar" class="character">👨‍🍳</div>
        <div id="stats">Para: 0 TL | Kebap: 0</div>
        <div id="gameLog" class="log">Dükkan açıldı, Bismillah!</div>
        <button class="btn-main" onclick="cook()">Kebap Çevir 🍢</button>
        <button onclick="buyUpgrade()">Upgrade (100 TL)</button>
        <button onclick="toggleMusic()">Müziği Başlat/Durdur 🎵</button>
    </div>

    <script>
        let money = 0, kebabs = 0, power = 10;
        const logEl = document.getElementById('gameLog');
        const bgMusic = new Audio('muzik.mp3'); // mp3 dosyalarını aynı klasöre at
        const sizzleSound = new Audio('ciz.mp3');

        function addLog(msg) {
            logEl.innerHTML = "> " + msg + "<br>" + logEl.innerHTML;
        }

        function toggleMusic() {
            if (bgMusic.paused) { bgMusic.play(); bgMusic.loop = true; }
            else { bgMusic.pause(); }
        }

        function cook() {
            money += power; kebabs++;
            sizzleSound.play();
            document.getElementById('stats').innerText = `Para: ${money} TL | Kebap: ${kebabs}`;
            if(kebabs % 5 === 0) addLog("Amedo usta, eline sağlık! Çıtır çıtır oldu.");
            localStorage.setItem('money', money);
        }

        function buyUpgrade() {
            if (money >= 100) {
                money -= 100; power += 10;
                addLog("Zırhlı makine alındı! Kazanç arttı.");
                document.getElementById('stats').innerText = `Para: ${money} TL | Kebap: ${kebabs}`;
            } else { addLog("Kirve, para yok!"); }
        }

        window.onload = () => {
            money = parseInt(localStorage.getItem('money')) || 0;
            document.getElementById('stats').innerText = `Para: ${money} TL | Kebap: ${kebabs}`;
        };
    </script>
</body>
</html>
